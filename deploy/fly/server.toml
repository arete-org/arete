# Fly app: canonical Footnote server (backend + local node supervisor)
app = 'footnote-server'
primary_region = 'ord'

[build]
  dockerfile = 'deploy/Dockerfile.server'

[env]
  NODE_ENV = 'production'
  ALLOWED_ORIGINS = 'https://ai.jordanmakes.dev'
  FRAME_ANCESTORS = 'https://ai.jordanmakes.dev'
  TURNSTILE_ALLOWED_HOSTNAMES = 'ai.jordanmakes.dev'

[[services]]
  internal_port = 3000
  protocol = 'tcp'
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = 'connections'

[[mounts]]
  source = 'footnote_data'
  destination = '/data'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '512mb'
