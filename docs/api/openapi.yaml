            description: |
                Upgrades the request to a WebSocket connection used for realtime
                voice sessions. Clients send `InternalVoiceRealtimeClientEvent`
                payloads and receive `InternalVoiceRealtimeServerEvent` payloads.
                Requires either `x-service-token` or `x-trace-token`.
            tags:
                - Voice
            security:
                - TrustedServiceToken: []
                - TraceToken: []
            responses:
                '101':
                    description: Switching Protocols (WebSocket accepted).
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '403':
                    $ref: '#/components/responses/Forbidden'
                '405':
                    $ref: '#/components/responses/MethodNotAllowed'
                '429':
                    $ref: '#/components/responses/TooManyRequests'
                '503':
