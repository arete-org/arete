            description: |
                Trusted internal endpoint for backend-owned image tasks that should not become a generic image proxy.
                The current task set includes `generate` only.
                Backend now owns image prompt assembly, including the active bot-profile overlay for the image system prompt.
                When `stream` is true, the route responds with NDJSON preview events followed by one terminal result event.
                Requires either `x-service-token` or `x-trace-token`.
                Applies the backend trusted-service rate limit bucket, including per-token constraints for authenticated internal callers.
            tags:
                - Image
            security:
                - TrustedServiceToken: []
                - TraceToken: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/InternalImageRequest'
            responses:
