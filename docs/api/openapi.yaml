        IncidentStatusRequest:
            type: object
            properties:
                status:
                    $ref: '#/components/schemas/IncidentStatus'
                actorUserId:
                    type: string
                notes:
                    type: string
            required:
                - status
            additionalProperties: false

        IncidentNotesRequest:
            type: object
            properties:
                actorUserId:
                    type: string
                notes:
                    type: string
            required:
                - notes
            additionalProperties: false

        IncidentRemediationRequest:
            type: object
            properties:
                actorUserId:
                    type: string
                state:
                    type: string
                    enum:
                        [applied, already_marked, skipped_not_assistant, failed]
                notes:
                    type: string
            required:
                - state
            additionalProperties: false

        # Chat payloads.
        ChatRequest:
            type: object
            properties:
                surface:
                    type: string
                    enum: [web, discord]
                trigger:
                    type: object
                    properties:
                        kind:
                            type: string
                            enum: [submit, direct, invoked, catchup]
                        messageId:
                            type: string
                            minLength: 1
                    required:
                        - kind
                    additionalProperties: false
                latestUserInput:
                    type: string
                    minLength: 0
                    maxLength: 3072
                    description: May be an empty string for passive catchup requests; chatPlanner will typically default these to ignore.
                conversation:
                    type: array
                    minItems: 1
                    maxItems: 64
                    items:
                        $ref: '#/components/schemas/ChatConversationMessage'
                attachments:
                    type: array
                    maxItems: 8
                    items:
                        $ref: '#/components/schemas/ChatAttachment'
                capabilities:
                    $ref: '#/components/schemas/ChatCapabilities'
                sessionId:
                    type: string
                    minLength: 1
                    maxLength: 128
                surfaceContext:
                    type: object
                    properties:
                        channelId:
                            type: string
                            minLength: 1
                        guildId:
                            type: string
                            minLength: 1
                        userId:
                            type: string
                            minLength: 1
                        requestHost:
                            type: string
                            minLength: 1
                    additionalProperties: false
            required:
                - surface
                - trigger
                - latestUserInput
                - conversation
            additionalProperties: false

        ChatResponse:
            discriminator:
                propertyName: action
                mapping:
                    message: '#/components/schemas/ChatMessageAction'
                    react: '#/components/schemas/ChatReactAction'
                    ignore: '#/components/schemas/ChatIgnoreAction'
                    image: '#/components/schemas/ChatImageAction'
            oneOf:
                - $ref: '#/components/schemas/ChatMessageAction'
                - $ref: '#/components/schemas/ChatReactAction'
                - $ref: '#/components/schemas/ChatIgnoreAction'
                - $ref: '#/components/schemas/ChatImageAction'

