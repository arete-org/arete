                            type: integer
                            minimum: 1
                            maximum: 5
                        attribution:
                            type: integer
                            minimum: 1
                            maximum: 5
                        caution:
                            type: integer
                            minimum: 1
                            maximum: 5
                        extent:
                            type: integer
                            minimum: 1
