# Spec version for this file; change only when upgrading tooling.
openapi: 3.1.0

# Quick Map
# - POST /api/reflect: Reflection (public; Turnstile + rate limits when configured)
# - OPTIONS /api/reflect: CORS preflight
# - POST /api/incidents/report: Incident report create (trusted internal auth)
# - GET /api/incidents: Incident list (trusted internal auth)
# - GET /api/incidents/{incidentId}: Incident detail (trusted internal auth)
# - POST /api/incidents/{incidentId}/status: Incident status update (trusted internal auth)
# - POST /api/incidents/{incidentId}/notes: Incident note append (trusted internal auth)
# - POST /api/incidents/{incidentId}/remediation: Incident remediation update (trusted internal auth)
# - POST /api/traces: Trace upsert (TraceToken required)
# - POST /api/trace-cards: Generate/store trace-card and return PNG payload (TraceToken required)
# - POST /api/trace-cards/from-trace: Generate/store trace-card from stored trace metadata by responseId (TraceToken required)
# - GET /api/traces/{responseId}: Trace fetch (public)
# - GET /api/traces/{responseId}/assets/trace-card.svg: Trace-card SVG fetch (public)
# - GET /api/blog-posts: Blog index (public)
# - GET /api/blog-posts/{postId}: Blog post (public)
# - POST /api/webhook/github: GitHub discussion webhook (signature when configured)
# - GET /config.json: Runtime config (public)
# - Operation/code index: docs/api/operation-map.md

# ====================
# Public API metadata
# ====================
info:
    title: Footnote Backend API
    # Versioning: bump when request/response shapes, status codes, or auth requirements change; docs-only edits can skip.
    version: 1.0.0
    license:
        name: MIT + Hippocratic License v3 (HL3-CORE)
        url: docs/LICENSE_STRATEGY.md
    description: |
        Backend wire contract and integration boundary for other packages.
        Reflection is the shared backend action-routing boundary for web and Discord surfaces.
        Non-2xx responses use ErrorResponse unless an operation states otherwise.
        info.version is manually maintained (see docs/api/README.md).

# Explicitly mark endpoints as unauthenticated by default.
security: []

# ====================
# Base URLs
# ====================
servers:
    - url: https://{backendHost}
      description: Backend API base URL
      variables:
          backendHost:
              default: api.your-domain.tld

# ====================
# Tags
# ====================
tags:
    - name: Chat
      description: Chat responses.
    - name: Incidents
      description: Internal incident report and review workflows.
    - name: Image # [Reserved]
      description: Image generation.
    - name: Voice # [Reserved]
      description: Voice and audio.
    - name: Traces
      description: Trace storage and retrieval.
    - name: Blog
      description: Public blog content.
    - name: Webhooks
      description: Webhook ingestion.
    - name: System
      description: Runtime config and service metadata.

# ====================
# Endpoints
# ====================
paths:
    # Reflection (public, Turnstile when enabled, rate-limited).
    /api/reflect:
        post:
            operationId: postReflect
            x-codeRefs:
                - packages/backend/src/handlers/reflect.ts#createReflectHandler
                - packages/web/src/utils/api.ts#reflectQuestion
                - packages/contracts/src/web/types.ts#PostReflectRequest
                - packages/contracts/src/web/types.ts#PostReflectResponse
            summary: Generate a reflective response
            description: |
                Submit a transport-neutral reflect request and receive the backend-selected action.
                Public web callers use Turnstile when enabled; trusted internal callers may authenticate with service headers.
                Send X-Session-Id / X-Turnstile-Token headers when needed for browser traffic.
            tags:
                - Chat
            parameters:
                - $ref: '#/components/parameters/SessionIdHeader'
                - $ref: '#/components/parameters/TurnstileTokenHeader'
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ReflectRequest'
            responses:
                '200':
                    $ref: '#/components/responses/ReflectOk'
                '403':
                    $ref: '#/components/responses/Forbidden'
                '400':
                    $ref: '#/components/responses/BadRequest'
                '405':
                    $ref: '#/components/responses/MethodNotAllowed'
                '413':
                    $ref: '#/components/responses/PayloadTooLarge'
                '429':
                    $ref: '#/components/responses/TooManyRequests'
                '500':
                    $ref: '#/components/responses/InternalServerError'
                '502':
                    $ref: '#/components/responses/BadGateway'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'
        options:
            operationId: optionsReflect
            x-codeRefs:
                - packages/backend/src/handlers/reflect.ts#createReflectHandler
            summary: CORS preflight
            description: |
                Handle CORS preflight for the reflect endpoint.
                Public endpoint; no auth or rate limits.
            tags:
                - Chat
            responses:
                '204':
                    $ref: '#/components/responses/PreflightAccepted'

    /api/incidents/report:
        post:
            operationId: postIncidentReport
            x-codeRefs:
                - packages/backend/src/handlers/incidents.ts#handleIncidentReportRequest
                - packages/discord-bot/src/api/incidents.ts#reportIncident
                - packages/contracts/src/web/types.ts#PostIncidentReportRequest
                - packages/contracts/src/web/types.ts#PostIncidentReportResponse
            summary: Create an incident report
            description: |
                Trusted internal endpoint for Discord-driven incident reports.
                Accepts raw Discord resource identifiers from the bot and persists only pseudonymized pointers.
                Requires either `x-service-token` or `x-trace-token`.
                Intended for trusted internal callers; normal internal service rate limits still apply.
            tags:
                - Incidents
            security:
                - TrustedServiceToken: []
                - TraceToken: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/IncidentReportRequest'
                        example:
                            reporterUserId: '123456789012345678'
                            guildId: '234567890123456789'
                            channelId: '345678901234567890'
                            messageId: '456789012345678901'
                            jumpUrl: 'https://discord.com/channels/234567890123456789/345678901234567890/456789012345678901'
                            responseId: 'response_123'
                            chainHash: 'hash_abc'
                            modelVersion: 'gpt-5-mini'
                            tags: [safety, review]
                            description: 'The assistant gave risky instructions.'
                            contact: 'moderator@example.com'
                            consentedAt: '2026-03-13T17:00:00.000Z'
            responses:
                '200':
                    $ref: '#/components/responses/IncidentReportOk'
                '400':
                    $ref: '#/components/responses/BadRequest'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '403':
                    $ref: '#/components/responses/Forbidden'
                '405':
                    $ref: '#/components/responses/MethodNotAllowed'
                '413':
                    $ref: '#/components/responses/PayloadTooLarge'
                '500':
                    $ref: '#/components/responses/InternalServerError'

    /api/incidents:
        get:
            operationId: listIncidents
            x-codeRefs:
                - packages/backend/src/handlers/incidents.ts#handleIncidentListRequest
                - packages/discord-bot/src/api/incidents.ts#listIncidents
                - packages/contracts/src/web/types.ts#GetIncidentsResponse
            summary: List incidents
            description: |
                Trusted internal endpoint for newest-first operator-safe incident summaries.
                Requires either `x-service-token` or `x-trace-token`.
                Intended for trusted internal callers; normal internal service rate limits still apply.
            tags:
                - Incidents
            security:
                - TrustedServiceToken: []
                - TraceToken: []
            parameters:
                - name: status
                  in: query
                  required: false
                  schema:
                      $ref: '#/components/schemas/IncidentStatus'
                - name: tag
                  in: query
                  required: false
                  schema:
                      type: string
                - name: createdFrom
                  in: query
                  required: false
                  schema:
                      type: string
                      format: date-time
                - name: createdTo
                  in: query
                  required: false
                  schema:
                      type: string
                      format: date-time
            responses:
                '200':
                    $ref: '#/components/responses/IncidentListOk'
                '400':
                    $ref: '#/components/responses/BadRequest'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '403':
                    $ref: '#/components/responses/Forbidden'
                '405':
                    $ref: '#/components/responses/MethodNotAllowed'
                '500':
                    $ref: '#/components/responses/InternalServerError'

    /api/incidents/{incidentId}:
        get:
            operationId: getIncident
            x-codeRefs:
                - packages/backend/src/handlers/incidents.ts#handleIncidentDetailRequest
                - packages/discord-bot/src/api/incidents.ts#getIncident
                - packages/contracts/src/web/types.ts#GetIncidentResponse
