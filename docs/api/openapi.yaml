                TraceToken required.
            tags:
                - Traces
            security:
                - TraceToken: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TraceCardFromTraceRequest'
            responses:
                '200':
                    $ref: '#/components/responses/TraceCardCreateOk'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '403':
                    $ref: '#/components/responses/Forbidden'
                '400':
                    $ref: '#/components/responses/BadRequest'
                '404':
                    $ref: '#/components/responses/NotFound'
                '413':
                    $ref: '#/components/responses/PayloadTooLarge'
                '429':
                    $ref: '#/components/responses/TooManyRequests'
                '500':
