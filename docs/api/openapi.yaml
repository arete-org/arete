            oneOf:
                - $ref: '#/components/schemas/InternalNewsTaskResponse'
                - $ref: '#/components/schemas/InternalImageDescriptionTaskResponse'
            discriminator:
                propertyName: task
                mapping:
                    news: '#/components/schemas/InternalNewsTaskResponse'
                    image_description: '#/components/schemas/InternalImageDescriptionTaskResponse'

