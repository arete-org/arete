                '405':
                    $ref: '#/components/responses/MethodNotAllowed'
                '500':
                    $ref: '#/components/responses/InternalServerError'

# ====================
# Components
# ====================
components:
    # Auth schemes and signature checks for trusted callers.
    securitySchemes:
        # Shared secret for trace ingestion.
        TraceToken:
            type: apiKey
            in: header
            name: x-trace-token
            description: Shared secret for trusted trace ingestion.
        TrustedServiceToken:
            type: apiKey
            in: header
            name: x-service-token
            description: Shared secret for trusted internal service callers.
        # GitHub webhook signature verification.
        GitHubWebhookSignature:
            type: apiKey
            in: header
            name: X-Hub-Signature-256
            description: GitHub webhook signature (sha256=...).

    # Data models for request/response payloads.
    schemas:
        # Errors.
        # Standard error envelope.
        ErrorResponse:
            type: object
            properties:
                error:
                    type: string
                details:
                    type: string
                retryAfter:
                    type: integer
                    description: Seconds until retry is allowed.
            required:
                - error
            additionalProperties: false

        IncidentStatus:
            type: string
            enum: [new, under_review, confirmed, dismissed, resolved]

        IncidentRemediationState:
            type: string
            enum:
                [
                    pending,
                    applied,
                    already_marked,
                    skipped_not_assistant,
                    failed,
                ]

        IncidentPointers:
            type: object
            properties:
                responseId:
                    type: string
                guildId:
                    type: string
                channelId:
                    type: string
                messageId:
                    type: string
                modelVersion:
                    type: string
                chainHash:
                    type: string
            additionalProperties: false

        IncidentAuditEvent:
            type: object
            properties:
                action:
                    type: string
                    enum:
                        - incident.created
                        - incident.remediated
                        - incident.status_changed
                        - incident.note_added
                actorHash:
                    type: string
                    nullable: true
                notes:
                    type: string
                    nullable: true
                createdAt:
                    type: string
                    format: date-time
            required:
                - action
                - createdAt
            additionalProperties: false

        IncidentRemediation:
            type: object
            properties:
                state:
                    $ref: '#/components/schemas/IncidentRemediationState'
                applied:
                    type: boolean
                notes:
                    type: string
                    nullable: true
                updatedAt:
                    type: string
                    format: date-time
                    nullable: true
            required:
                - state
                - applied
            additionalProperties: false

        IncidentSummary:
            type: object
            properties:
                incidentId:
                    type: string
                status:
                    $ref: '#/components/schemas/IncidentStatus'
                tags:
                    type: array
                    maxItems: 25
                    items:
                        type: string
                description:
                    type: string
                    nullable: true
                contact:
                    type: string
                    nullable: true
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
                consentedAt:
                    type: string
                    format: date-time
                pointers:
                    $ref: '#/components/schemas/IncidentPointers'
                remediation:
                    $ref: '#/components/schemas/IncidentRemediation'
            required:
                - incidentId
                - status
                - tags
                - createdAt
                - updatedAt
                - consentedAt
                - pointers
                - remediation
            additionalProperties: false
            example:
                incidentId: '1a2b3c4d'
                status: under_review
                tags: [safety, review]
                description: 'The assistant gave risky instructions.'
                contact: 'moderator@example.com'
                createdAt: '2026-03-13T17:00:00.000Z'
                updatedAt: '2026-03-13T17:05:00.000Z'
                consentedAt: '2026-03-13T17:00:00.000Z'
                pointers:
                    responseId: 'response_123'
                    guildId: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
                    channelId: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
                    messageId: cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
                    modelVersion: 'gpt-5-mini'
                    chainHash: 'hash_abc'
                remediation:
                    state: applied
                    applied: true
                    notes: 'Warning banner applied with spoiler wrapping.'
                    updatedAt: '2026-03-13T17:01:00.000Z'

        IncidentDetail:
            type: object
            properties:
                incidentId:
                    type: string
                status:
                    $ref: '#/components/schemas/IncidentStatus'
                tags:
                    type: array
                    maxItems: 25
                    items:
                        type: string
                description:
                    type: string
                    nullable: true
