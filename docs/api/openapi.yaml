                    type: string
                    enum:
                        - slow
                        - normal
                        - fast
                pitch:
                    type: string
                    enum:
                        - low
                        - normal
                        - high
                emphasis:
                    type: string
                    enum:
                        - none
                        - moderate
                        - strong
                style:
                    type: string
                    minLength: 1
                    maxLength: 200
                styleDegree:
                    type: string
                    enum:
                        - low
                        - normal
