                '405':
                    $ref: '#/components/responses/MethodNotAllowed'
                '413':
                    $ref: '#/components/responses/PayloadTooLarge'
                '429':
                    $ref: '#/components/responses/TooManyRequests'
                '500':
                    $ref: '#/components/responses/InternalServerError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    # Trace-card create (TraceToken required).
    /api/trace-cards:
        post:
            operationId: postTraceCards
            x-codeRefs:
                - packages/backend/src/handlers/trace.ts#handleTraceCardCreateRequest
                - packages/discord-bot/src/api/traces.ts#postTraceCard
                - packages/contracts/src/web/types.ts#PostTraceCardRequest
                - packages/contracts/src/web/types.ts#PostTraceCardResponse
            summary: Generate and store a trace-card
            description: |
                Generate a trace-card from TRACE temperament and score metadata, persist the canonical SVG asset,
                and return a PNG payload for Discord-style inline display.
                TraceToken required.
            tags:
                - Traces
            security:
                - TraceToken: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TraceCardRequest'
            responses:
