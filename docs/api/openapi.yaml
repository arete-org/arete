    # ====================
    responses:
        # Success responses.
        PreflightAccepted:
            description: Preflight accepted.
        ReflectOk:
            description: Reflect response with metadata.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ReflectResponse'
        IncidentReportOk:
