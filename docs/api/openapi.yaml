        # Reflection.
        # Reflect payloads.
        ReflectRequest:
            type: object
            properties:
                surface:
                    type: string
                    enum: [web, discord]
                trigger:
                    type: object
                    properties:
                        kind:
                            type: string
                            enum: [submit, direct, invoked, catchup]
                        messageId:
                            type: string
                            minLength: 1
                    required:
                        - kind
                    additionalProperties: false
                latestUserInput:
                    type: string
                    minLength: 0
                    maxLength: 3072
                    description: May be an empty string for passive catchup requests; reflectPlanner will typically default these to ignore.
                conversation:
                    type: array
                    minItems: 1
                    maxItems: 64
                    items:
                        $ref: '#/components/schemas/ReflectConversationMessage'
                attachments:
                    type: array
                    maxItems: 8
                    items:
                        $ref: '#/components/schemas/ReflectAttachment'
                capabilities:
                    $ref: '#/components/schemas/ReflectCapabilities'
                sessionId:
                    type: string
                    minLength: 1
                    maxLength: 128
                surfaceContext:
                    type: object
                    properties:
                        channelId:
                            type: string
                            minLength: 1
                        guildId:
                            type: string
                            minLength: 1
                        userId:
                            type: string
                            minLength: 1
                        requestHost:
                            type: string
                            minLength: 1
                    additionalProperties: false
            required:
                - surface
                - trigger
                - latestUserInput
                - conversation
            additionalProperties: false

        ReflectResponse:
            discriminator:
                propertyName: action
                mapping:
                    message: '#/components/schemas/ReflectMessageAction'
                    react: '#/components/schemas/ReflectReactAction'
                    ignore: '#/components/schemas/ReflectIgnoreAction'
                    image: '#/components/schemas/ReflectImageAction'
            oneOf:
                - $ref: '#/components/schemas/ReflectMessageAction'
                - $ref: '#/components/schemas/ReflectReactAction'
                - $ref: '#/components/schemas/ReflectIgnoreAction'
                - $ref: '#/components/schemas/ReflectImageAction'

        ReflectConversationMessage:
            type: object
            properties:
                role:
                    type: string
                    enum: [system, user, assistant]
                content:
                    type: string
                    minLength: 1
                authorName:
                    type: string
                    minLength: 1
                authorId:
                    type: string
                    minLength: 1
                messageId:
                    type: string
                    minLength: 1
                createdAt:
                    type: string
                    minLength: 1
                    format: date-time
            required:
                - role
                - content
            additionalProperties: false

        ReflectAttachment:
            type: object
            properties:
                kind:
                    type: string
                    enum: [image]
                url:
                    type: string
                    minLength: 1
                    format: uri
                    pattern: ^https?://
                contentType:
                    type: string
                    minLength: 1
            required:
                - kind
                - url
            additionalProperties: false

        ReflectCapabilities:
            type: object
            properties:
                canReact:
                    type: boolean
                canGenerateImages:
                    type: boolean
                canUseTts:
                    type: boolean
            required:
                - canReact
                - canGenerateImages
                - canUseTts
            additionalProperties: false

        ReflectImageRequest:
            type: object
            properties:
                prompt:
                    type: string
                    minLength: 1
                aspectRatio:
                    type: string
                    enum: [auto, square, portrait, landscape]
                background:
                    type: string
                    minLength: 1
                quality:
                    type: string
                    enum: [low, medium, high, auto]
                style:
                    type: string
                    minLength: 1
                allowPromptAdjustment:
                    type: boolean
                followUpResponseId:
                    type: string
                    minLength: 1
                outputFormat:
                    type: string
                    enum: [png, webp, jpeg]
                outputCompression:
                    type: integer
                    minimum: 1
                    maximum: 100
            required:
                - prompt
            additionalProperties: false

        ReflectMessageAction:
            type: object
            properties:
                action:
                    type: string
                    enum: [message]
                message:
                    type: string
                    minLength: 1
                modality:
                    type: string
                    enum: [text, tts]
                metadata:
                    $ref: '#/components/schemas/ResponseMetadata'
            required:
                - action
                - message
                - modality
                - metadata
            additionalProperties: true

        ReflectReactAction:
            type: object
            properties:
                action:
                    type: string
                    enum: [react]
                reaction:
                    type: string
                    minLength: 1
                metadata:
                    type: 'null'
            required:
                - action
                - reaction
                - metadata
            additionalProperties: true

        ReflectIgnoreAction:
            type: object
            properties:
                action:
                    type: string
                    enum: [ignore]
                metadata:
                    type: 'null'
            required:
                - action
                - metadata
            additionalProperties: true

        ReflectImageAction:
            type: object
            properties:
                action:
                    type: string
                    enum: [image]
                imageRequest:
                    $ref: '#/components/schemas/ReflectImageRequest'
                metadata:
                    type: 'null'
            required:
                - action
                - imageRequest
                - metadata
            additionalProperties: true

        # Traces + provenance.
        # Trace metadata payloads.
        ResponseMetadataBase:
            type: object
            properties:
                provenance:
                    type: string
                    description: Expected values are Retrieved, Inferred, or Speculative.
                riskTier:
                    type: string
                    description: Expected values are Low, Medium, or High.
                tradeoffCount:
                    type: number
                    description: Expected minimum is 0.
                chainHash:
                    type: string
                licenseContext:
                    type: string
                modelVersion:
                    type: string
                staleAfter:
                    type: string
                    format: date-time
                citations:
                    type: array
                    items:
                        $ref: '#/components/schemas/Citation'
                imageDescriptions:
                    type: array
                    items:
                        type: string
                evidenceScore:
                    type: integer
                    minimum: 1
                    maximum: 5
                    description: Optional TRACE evidence chip score.
                freshnessScore:
                    type: integer
                    minimum: 1
                    maximum: 5
                    description: Optional TRACE freshness chip score.
                temperament:
                    type: object
                    description: Optional partial TRACE temperament profile with named 1-5 integer axes.
                    properties:
                        tightness:
                            type: integer
                            description: 1 to 5, where higher means stronger concision and structural efficiency.
                            minimum: 1
                            maximum: 5
                        rationale:
                            type: integer
                            description: 1 to 5, where higher means more visible rationale and trade-off explanation.
                            minimum: 1
                            maximum: 5
                        attribution:
                            type: integer
                            description: 1 to 5, where higher means clearer sourced vs inferred boundaries.
                            minimum: 1
                            maximum: 5
                        caution:
                            type: integer
                            description: 1 to 5, where higher means stronger safeguards and overclaim restraint.
                            minimum: 1
                            maximum: 5
                        extent:
                            type: integer
                            description: 1 to 5, where higher means broader options and perspectives.
                            minimum: 1
                            maximum: 5
                    additionalProperties: false
            required:
                - provenance
                - riskTier
                - tradeoffCount
                - chainHash
                - licenseContext
                - modelVersion
                - staleAfter
                - citations
            additionalProperties: true

        ResponseMetadata:
            allOf:
                - $ref: '#/components/schemas/ResponseMetadataBase'
                - type: object
                  properties:
                      responseId:
                          type: string
                  required:
                      - responseId

        TraceUpsertRequest:
            description: ResponseMetadata payload for trace ingestion.
            allOf:
                - $ref: '#/components/schemas/ResponseMetadata'

        TraceCardChips:
