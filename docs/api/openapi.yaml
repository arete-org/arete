                  required: false
                  schema:
                      $ref: '#/components/schemas/IncidentStatus'
                - name: tag
                  in: query
                  required: false
                  schema:
                      type: string
                - name: createdFrom
                  in: query
                  required: false
                  schema:
                      type: string
                      format: date-time
                - name: createdTo
                  in: query
                  required: false
                  schema:
                      type: string
