            enum:
                - mp3
                - opus
                - aac
                - flac
                - wav
                - pcm

        InternalTtsModel:
            type: string
            enum:
                - tts-1
                - tts-1-hd
                - gpt-4o-mini-tts

        InternalTtsVoice:
            type: string
            enum:
