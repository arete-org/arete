                - packages/backend/src/handlers/internalVoiceRealtime.ts#handleUpgrade
                - packages/discord-bot/src/utils/realtimeService.ts#connect
                - packages/contracts/src/voice/types.ts#InternalVoiceRealtimeClientEvent
                - packages/contracts/src/voice/types.ts#InternalVoiceRealtimeServerEvent
