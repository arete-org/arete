# Spec version for this file; change only when upgrading tooling.
openapi: 3.1.0

# Quick Map
# - POST /api/reflect: Reflection (public; Turnstile + rate limits when configured)
# - OPTIONS /api/reflect: CORS preflight
# - POST /api/traces: Trace upsert (TraceToken required)
# - POST /api/trace-cards: Generate/store trace-card and return PNG payload (TraceToken required)
# - POST /api/trace-cards/from-trace: Generate/store trace-card from stored trace metadata (TraceToken required)
# - GET /api/traces/{responseId}: Trace fetch (public)
# - GET /api/traces/{responseId}/assets/trace-card.svg: Trace-card SVG fetch (public)
# - GET /api/blog-posts: Blog index (public)
# - GET /api/blog-posts/{postId}: Blog post (public)
# - POST /api/webhook/github: GitHub discussion webhook (signature when configured)
# - GET /config.json: Runtime config (public)
# - Operation/code index: docs/api/operation-map.md

# ====================
# Public API metadata
# ====================
info:
    title: Footnote Backend API
    # Versioning: bump when request/response shapes, status codes, or auth requirements change; docs-only edits can skip.
    version: 1.0.0
    license:
        name: MIT + Hippocratic License v3 (HL3-CORE)
        url: docs/LICENSE_STRATEGY.md
    description: |
        Backend wire contract and integration boundary for other packages.
        Reflection is the shared backend action-routing boundary for web and Discord surfaces.
        Non-2xx responses use ErrorResponse unless an operation states otherwise.
        info.version is manually maintained (see docs/api/README.md).

# Explicitly mark endpoints as unauthenticated by default.
security: []

# ====================
# Base URLs
# ====================
servers:
    - url: https://{backendHost}
      description: Backend API base URL
      variables:
          backendHost:
              default: api.your-domain.tld

# ====================
# Tags
# ====================
tags:
    - name: Chat
      description: Chat responses.
    - name: Image # [Reserved]
      description: Image generation.
    - name: Voice # [Reserved]
      description: Voice and audio.
    - name: Traces
      description: Trace storage and retrieval.
    - name: Blog
      description: Public blog content.
    - name: Webhooks
      description: Webhook ingestion.
    - name: System
      description: Runtime config and service metadata.

# ====================
# Endpoints
# ====================
paths:
    # Reflection (public, Turnstile when enabled, rate-limited).
    /api/reflect:
        post:
            operationId: postReflect
            x-codeRefs:
                - packages/backend/src/handlers/reflect.ts#createReflectHandler
                - packages/web/src/utils/api.ts#reflectQuestion
                - packages/contracts/src/web/types.ts#PostReflectRequest
                - packages/contracts/src/web/types.ts#PostReflectResponse
            summary: Generate a reflective response
            description: |
                Submit a transport-neutral reflect request and receive the backend-selected action.
                Public web callers use Turnstile when enabled; trusted internal callers may authenticate with service headers.
                Send X-Session-Id / X-Turnstile-Token headers when needed for browser traffic.
            tags:
                - Chat
            parameters:
                - $ref: '#/components/parameters/SessionIdHeader'
                - $ref: '#/components/parameters/TurnstileTokenHeader'
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ReflectRequest'
            responses:
                '200':
                    $ref: '#/components/responses/ReflectOk'
                '403':
                    $ref: '#/components/responses/Forbidden'
                '400':
                    $ref: '#/components/responses/BadRequest'
                '405':
                    $ref: '#/components/responses/MethodNotAllowed'
                '413':
                    $ref: '#/components/responses/PayloadTooLarge'
                '429':
                    $ref: '#/components/responses/TooManyRequests'
                '500':
                    $ref: '#/components/responses/InternalServerError'
                '502':
                    $ref: '#/components/responses/BadGateway'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'
        options:
            operationId: optionsReflect
            x-codeRefs:
                - packages/backend/src/handlers/reflect.ts#createReflectHandler
            summary: CORS preflight
            description: |
                Handle CORS preflight for the reflect endpoint.
                Public endpoint; no auth or rate limits.
            tags:
                - Chat
            responses:
                '204':
                    $ref: '#/components/responses/PreflightAccepted'

    # Trace upsert (TraceToken required, rate-limited).
    /api/traces:
        post:
            operationId: postTraces
            x-codeRefs:
                - packages/backend/src/handlers/trace.ts#handleTraceUpsertRequest
                - packages/discord-bot/src/api/traces.ts#postTraces
                - packages/contracts/src/web/types.ts#PostTracesRequest
                - packages/contracts/src/web/types.ts#PostTracesResponse
            summary: Upsert trace metadata
            description: |
                Store ResponseMetadata for a responseId.
                TraceToken required; rate limited per client IP.
            tags:
                - Traces
            security:
                - TraceToken: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TraceUpsertRequest'
            responses:
                '200':
                    $ref: '#/components/responses/TraceUpsertOk'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '403':
                    $ref: '#/components/responses/Forbidden'
                '400':
                    $ref: '#/components/responses/BadRequest'
                '405':
                    $ref: '#/components/responses/MethodNotAllowed'
                '413':
                    $ref: '#/components/responses/PayloadTooLarge'
                '429':
                    $ref: '#/components/responses/TooManyRequests'
                '500':
                    $ref: '#/components/responses/InternalServerError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    # Trace-card create (TraceToken required).
    /api/trace-cards:
        post:
            operationId: postTraceCards
            x-codeRefs:
                - packages/backend/src/handlers/trace.ts#handleTraceCardCreateRequest
                - packages/discord-bot/src/api/traces.ts#postTraceCard
                - packages/contracts/src/web/types.ts#PostTraceCardRequest
                - packages/contracts/src/web/types.ts#PostTraceCardResponse
            summary: Generate and store a trace-card
            description: |
                Generate a trace-card from TRACE temperament data plus explicit evidence/freshness scores, persist the canonical SVG asset,
                and return a PNG payload for Discord-style inline display.
                TraceToken required.
            tags:
                - Traces
            security:
                - TraceToken: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TraceCardRequest'
            responses:
                '200':
                    $ref: '#/components/responses/TraceCardCreateOk'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '403':
                    $ref: '#/components/responses/Forbidden'
                '400':
                    $ref: '#/components/responses/BadRequest'
                '413':
                    $ref: '#/components/responses/PayloadTooLarge'
                '429':
                    $ref: '#/components/responses/TooManyRequests'
                '500':
                    $ref: '#/components/responses/InternalServerError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    # Trace-card create from stored trace metadata (TraceToken required).
    /api/trace-cards/from-trace:
        post:
            operationId: postTraceCardsFromTrace
            x-codeRefs:
                - packages/backend/src/handlers/trace.ts#handleTraceCardFromTraceRequest
                - packages/discord-bot/src/api/traces.ts#postTraceCardFromTrace
                - packages/contracts/src/web/types.ts#PostTraceCardFromTraceRequest
                - packages/contracts/src/web/types.ts#PostTraceCardFromTraceResponse
            summary: Generate and store a trace-card from an existing trace
            description: |
                Load stored trace metadata by response id, require explicit metadata scores in the request,
                regenerate/store the canonical SVG asset, and return a PNG payload for inline display.
                TraceToken required.
            tags:
                - Traces
            security:
                - TraceToken: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TraceCardFromTraceRequest'
            responses:
                '200':
                    $ref: '#/components/responses/TraceCardCreateOk'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '403':
                    $ref: '#/components/responses/Forbidden'
                '400':
                    $ref: '#/components/responses/BadRequest'
                '404':
                    $ref: '#/components/responses/NotFound'
                '409':
                    $ref: '#/components/responses/Conflict'
                '413':
                    $ref: '#/components/responses/PayloadTooLarge'
                '429':
                    $ref: '#/components/responses/TooManyRequests'
                '500':
                    $ref: '#/components/responses/InternalServerError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    # Trace fetch (public).
    /api/traces/{responseId}:
        get:
            operationId: getTrace
            x-codeRefs:
                - packages/backend/src/handlers/trace.ts#handleTraceRequest
                - packages/discord-bot/src/api/traces.ts#getTrace
                - packages/web/src/utils/api.ts#getTrace
                - packages/contracts/src/web/types.ts#GetTraceResponse
                - packages/contracts/src/web/types.ts#GetTraceStaleResponse
            summary: Fetch a stored trace
            description: |
                Return stored ResponseMetadata by response ID.
                Public endpoint; no auth or rate limits.
            tags:
                - Traces
            parameters:
                - $ref: '#/components/parameters/TraceResponseId'
            responses:
                '200':
                    $ref: '#/components/responses/TraceFetchOk'
                '400':
                    $ref: '#/components/responses/BadRequest'
                '404':
                    $ref: '#/components/responses/NotFound'
                '410':
                    $ref: '#/components/responses/Gone'
                '500':
                    $ref: '#/components/responses/InternalServerError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    # Trace-card SVG fetch (public).
    /api/traces/{responseId}/assets/trace-card.svg:
        get:
            operationId: getTraceCardSvg
            x-codeRefs:
                - packages/backend/src/handlers/trace.ts#handleTraceCardAssetRequest
                - packages/contracts/src/web/types.ts#GetTraceCardSvgResponse
            summary: Fetch trace-card SVG
            description: |
                Return the stored trace-card SVG asset by response id.
                Public endpoint; no auth or rate limits.
            tags:
                - Traces
            parameters:
                - $ref: '#/components/parameters/TraceResponseId'
            responses:
                '200':
                    $ref: '#/components/responses/TraceCardSvgOk'
                '400':
                    $ref: '#/components/responses/BadRequest'
                '404':
                    $ref: '#/components/responses/NotFound'
                '500':
                    $ref: '#/components/responses/InternalServerError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    # Blog index (public).
    /api/blog-posts:
        get:
            operationId: listBlogPosts
            x-codeRefs:
                - packages/backend/src/handlers/blog.ts#handleBlogIndexRequest
                - packages/web/src/utils/api.ts#getBlogIndex
                - packages/contracts/src/web/types.ts#ListBlogPostsResponse
            summary: List blog posts
            description: |
                Return the public blog index (trailing slash accepted).
                Public endpoint; no auth or rate limits.
            tags:
                - Blog
            responses:
                '200':
                    $ref: '#/components/responses/BlogIndexOk'
                '405':
                    $ref: '#/components/responses/MethodNotAllowed'
                '500':
                    $ref: '#/components/responses/InternalServerError'

    /api/blog-posts/{postId}:
        get:
            operationId: getBlogPost
            x-codeRefs:
                - packages/backend/src/handlers/blog.ts#handleBlogPostRequest
                - packages/web/src/utils/api.ts#getBlogPost
                - packages/contracts/src/web/types.ts#GetBlogPostResponse
            summary: Fetch a blog post
            description: |
                Return a single blog post by numeric id.
                Public endpoint; no auth or rate limits.
            tags:
                - Blog
            parameters:
                - $ref: '#/components/parameters/BlogPostId'
            responses:
                '200':
                    $ref: '#/components/responses/BlogPostOk'
                '400':
                    $ref: '#/components/responses/BadRequest'
                '404':
                    $ref: '#/components/responses/NotFound'
                '405':
                    $ref: '#/components/responses/MethodNotAllowed'
                '500':
                    $ref: '#/components/responses/InternalServerError'

    # GitHub webhook (signature when configured).
    /api/webhook/github:
        post:
            operationId: postGitHubWebhook
            x-codeRefs:
                - packages/backend/src/handlers/webhook.ts#createWebhookHandler
            summary: Ingest GitHub discussion webhook
            description: |
                Accept GitHub discussion events to sync blog posts.
                Signature required when configured; otherwise ignored.
            tags:
                - Webhooks
            security:
                # Signature is enforced only when GITHUB_WEBHOOK_SECRET is configured; otherwise requests are ignored with 200.
                - GitHubWebhookSignature: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/GitHubDiscussionWebhook'
            responses:
                '200':
                    $ref: '#/components/responses/WebhookOk'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '400':
                    $ref: '#/components/responses/BadRequest'
                '405':
                    $ref: '#/components/responses/MethodNotAllowed'
                '413':
                    $ref: '#/components/responses/PayloadTooLarge'
                '500':
                    $ref: '#/components/responses/InternalServerError'

    # Runtime config (public).
    /config.json:
        get:
            operationId: getRuntimeConfig
            x-codeRefs:
                - packages/backend/src/handlers/config.ts#createRuntimeConfigHandler
                - packages/web/src/utils/api.ts#getRuntimeConfig
                - packages/contracts/src/web/types.ts#GetRuntimeConfigResponse
            summary: Fetch runtime config
            description: |
                Return public runtime configuration for web clients.
                Public endpoint; no auth or rate limits.
            tags:
                - System
            responses:
                '200':
                    $ref: '#/components/responses/RuntimeConfigOk'
                '405':
                    $ref: '#/components/responses/MethodNotAllowed'
                '500':
                    $ref: '#/components/responses/InternalServerError'

# ====================
# Components
# ====================
components:
    # Auth schemes and signature checks for trusted callers.
    securitySchemes:
        # Shared secret for trace ingestion.
        TraceToken:
            type: apiKey
            in: header
            name: x-trace-token
            description: Shared secret for trusted trace ingestion.
        # GitHub webhook signature verification.
        GitHubWebhookSignature:
            type: apiKey
            in: header
            name: X-Hub-Signature-256
            description: GitHub webhook signature (sha256=...).

    # Data models for request/response payloads.
    schemas:
        # Errors.
        # Standard error envelope.
        ErrorResponse:
            type: object
            properties:
                error:
                    type: string
                details:
                    type: string
                retryAfter:
                    type: integer
                    description: Seconds until retry is allowed.
            required:
                - error
            additionalProperties: false

        # Reflection.
        # Reflect payloads.
        ReflectRequest:
            type: object
            properties:
                surface:
                    type: string
                    enum: [web, discord]
                trigger:
                    type: object
                    properties:
                        kind:
                            type: string
                            enum: [submit, direct, invoked, catchup]
                        messageId:
                            type: string
                            minLength: 1
                    required:
                        - kind
                    additionalProperties: false
                latestUserInput:
                    type: string
                    minLength: 0
                    maxLength: 3072
                    description: May be an empty string for passive catchup requests; reflectPlanner will typically default these to ignore.
                conversation:
                    type: array
                    minItems: 1
                    maxItems: 64
                    items:
                        $ref: '#/components/schemas/ReflectConversationMessage'
                attachments:
                    type: array
                    maxItems: 8
                    items:
                        $ref: '#/components/schemas/ReflectAttachment'
                capabilities:
                    $ref: '#/components/schemas/ReflectCapabilities'
                sessionId:
                    type: string
                    minLength: 1
                    maxLength: 128
                surfaceContext:
                    type: object
                    properties:
                        channelId:
                            type: string
                            minLength: 1
                        guildId:
                            type: string
                            minLength: 1
                        userId:
                            type: string
                            minLength: 1
                        requestHost:
                            type: string
                            minLength: 1
                    additionalProperties: false
            required:
                - surface
                - trigger
                - latestUserInput
                - conversation
            additionalProperties: false

        ReflectResponse:
            discriminator:
                propertyName: action
                mapping:
                    message: '#/components/schemas/ReflectMessageAction'
                    react: '#/components/schemas/ReflectReactAction'
                    ignore: '#/components/schemas/ReflectIgnoreAction'
                    image: '#/components/schemas/ReflectImageAction'
            oneOf:
                - $ref: '#/components/schemas/ReflectMessageAction'
                - $ref: '#/components/schemas/ReflectReactAction'
                - $ref: '#/components/schemas/ReflectIgnoreAction'
                - $ref: '#/components/schemas/ReflectImageAction'

        ReflectConversationMessage:
            type: object
            properties:
                role:
                    type: string
                    enum: [system, user, assistant]
                content:
                    type: string
                    minLength: 1
                authorName:
                    type: string
                    minLength: 1
                authorId:
                    type: string
                    minLength: 1
                messageId:
                    type: string
                    minLength: 1
                createdAt:
                    type: string
                    minLength: 1
                    format: date-time
            required:
                - role
                - content
            additionalProperties: false

        ReflectAttachment:
            type: object
            properties:
                kind:
                    type: string
                    enum: [image]
                url:
                    type: string
                    minLength: 1
                    format: uri
                    pattern: ^https?://
                contentType:
                    type: string
                    minLength: 1
            required:
                - kind
                - url
            additionalProperties: false

        ReflectCapabilities:
            type: object
            properties:
                canReact:
                    type: boolean
                canGenerateImages:
                    type: boolean
                canUseTts:
                    type: boolean
            required:
                - canReact
                - canGenerateImages
                - canUseTts
            additionalProperties: false

        ReflectImageRequest:
            type: object
            properties:
                prompt:
                    type: string
                    minLength: 1
                aspectRatio:
                    type: string
                    enum: [auto, square, portrait, landscape]
                background:
                    type: string
                    minLength: 1
                quality:
                    type: string
                    enum: [low, medium, high, auto]
                style:
                    type: string
                    minLength: 1
                allowPromptAdjustment:
                    type: boolean
                followUpResponseId:
                    type: string
                    minLength: 1
                outputFormat:
                    type: string
                    enum: [png, webp, jpeg]
                outputCompression:
                    type: integer
                    minimum: 1
                    maximum: 100
            required:
                - prompt
            additionalProperties: false

        ReflectMessageAction:
            type: object
            properties:
                action:
                    type: string
                    enum: [message]
                message:
                    type: string
                    minLength: 1
                modality:
                    type: string
                    enum: [text, tts]
                metadata:
                    $ref: '#/components/schemas/ResponseMetadata'
            required:
                - action
                - message
                - modality
                - metadata
            additionalProperties: true

        ReflectReactAction:
            type: object
            properties:
                action:
                    type: string
                    enum: [react]
                reaction:
                    type: string
                    minLength: 1
                metadata:
                    type: 'null'
            required:
                - action
                - reaction
                - metadata
            additionalProperties: true

        ReflectIgnoreAction:
            type: object
            properties:
                action:
                    type: string
                    enum: [ignore]
                metadata:
                    type: 'null'
            required:
                - action
                - metadata
            additionalProperties: true

        ReflectImageAction:
            type: object
            properties:
                action:
                    type: string
                    enum: [image]
                imageRequest:
                    $ref: '#/components/schemas/ReflectImageRequest'
                metadata:
                    type: 'null'
            required:
                - action
                - imageRequest
                - metadata
            additionalProperties: true

        # Traces + provenance.
        # Trace metadata payloads.
        ResponseMetadataBase:
            type: object
            properties:
                provenance:
                    type: string
                    description: Expected values are Retrieved, Inferred, or Speculative.
                confidence:
                    type: number
                    description: Expected range is 0.0 to 1.0.
                riskTier:
                    type: string
                    description: Expected values are Low, Medium, or High.
                tradeoffCount:
                    type: number
                    description: Expected minimum is 0.
                chainHash:
                    type: string
                licenseContext:
                    type: string
                modelVersion:
                    type: string
                staleAfter:
                    type: string
                    format: date-time
                citations:
                    type: array
                    items:
                        $ref: '#/components/schemas/Citation'
                imageDescriptions:
                    type: array
                    items:
                        type: string
                temperament:
                    type: object
                    description: Optional TRACE temperament profile with named 1-10 integer axes. This field is optional for now and is expected to become required after full TRACE validation.
                    properties:
                        tightness:
                            type: integer
                            description: 1 to 10, where higher means stronger concision and structural efficiency.
                            minimum: 1
                            maximum: 10
                        rationale:
                            type: integer
                            description: 1 to 10, where higher means more visible rationale and trade-off explanation.
                            minimum: 1
                            maximum: 10
                        attribution:
                            type: integer
                            description: 1 to 10, where higher means clearer sourced vs inferred boundaries.
                            minimum: 1
                            maximum: 10
                        caution:
                            type: integer
                            description: 1 to 10, where higher means stronger safeguards and overclaim restraint.
                            minimum: 1
                            maximum: 10
                        extent:
                            type: integer
                            description: 1 to 10, where higher means broader options and perspectives.
                            minimum: 1
                            maximum: 10
                    required:
                        - tightness
                        - rationale
                        - attribution
                        - caution
                        - extent
                    additionalProperties: false
            required:
                - provenance
                - confidence
                - riskTier
                - tradeoffCount
                - chainHash
                - licenseContext
                - modelVersion
                - staleAfter
                - citations
            additionalProperties: true

        ResponseMetadata:
            allOf:
                - $ref: '#/components/schemas/ResponseMetadataBase'
                - type: object
                  properties:
                      responseId:
                          type: string
                  required:
                      - responseId

        TraceUpsertRequest:
            description: ResponseMetadata payload for trace ingestion.
            allOf:
                - $ref: '#/components/schemas/ResponseMetadata'

        TraceCardChips:
            type: object
            properties:
                evidenceScore:
                    type: number
                    minimum: 1
                    maximum: 5
                freshnessScore:
                    type: number
                    minimum: 1
                    maximum: 5
            required:
                - evidenceScore
                - freshnessScore
            additionalProperties: false

        TraceCardRequest:
            type: object
            properties:
                responseId:
                    type: string
                    minLength: 1
                temperament:
                    type: object
                    properties:
                        tightness:
                            type: integer
                            minimum: 1
                            maximum: 10
                        rationale:
                            type: integer
                            minimum: 1
                            maximum: 10
                        attribution:
                            type: integer
                            minimum: 1
                            maximum: 10
                        caution:
                            type: integer
                            minimum: 1
                            maximum: 10
                        extent:
                            type: integer
                            minimum: 1
                            maximum: 10
                    required:
                        - tightness
                        - rationale
                        - attribution
                        - caution
                        - extent
                    additionalProperties: false
                chips:
                    $ref: '#/components/schemas/TraceCardChips'
            required:
                - temperament
                - chips
            additionalProperties: false

        TraceCardResponse:
            type: object
            properties:
                responseId:
                    type: string
                    minLength: 1
                pngBase64:
                    type: string
                    minLength: 1
            required:
                - responseId
                - pngBase64
            additionalProperties: true

        TraceCardFromTraceRequest:
            type: object
            properties:
                responseId:
                    type: string
                    minLength: 1
                chips:
                    $ref: '#/components/schemas/TraceCardChips'
            required:
                - responseId
                - chips
            additionalProperties: false

        # Citations for provenance and attribution.
        Citation:
            type: object
            properties:
                title:
                    type: string
                url:
                    type: string
                    format: uri
                snippet:
                    type: string
            required:
                - title
                - url
            additionalProperties: false

        # Trace ingest and expiry responses.
        TraceUpsertResponse:
            type: object
            properties:
                ok:
                    type: boolean
                responseId:
                    type: string
            required:
                - ok
                - responseId
            additionalProperties: false

        TraceStaleResponse:
            type: object
            properties:
                message:
                    type: string
                metadata:
                    $ref: '#/components/schemas/ResponseMetadata'
            required:
                - message
                - metadata
            additionalProperties: false

        # Blog content.
        # Blog content payloads.
        BlogPostAuthor:
            type: object
            properties:
                login:
                    type: string
                avatarUrl:
                    type: string
                    format: uri
                profileUrl:
                    type: string
                    format: uri
            required:
                - login
                - avatarUrl
                - profileUrl
            additionalProperties: false

        BlogPostIndexEntry:
            type: object
            properties:
                number:
                    type: integer
                title:
                    type: string
                author:
                    $ref: '#/components/schemas/BlogPostAuthor'
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
            required:
                - number
                - title
                - author
                - createdAt
                - updatedAt
            additionalProperties: false

        BlogPost:
            type: object
            properties:
                number:
                    type: integer
                title:
                    type: string
                author:
                    $ref: '#/components/schemas/BlogPostAuthor'
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
                body:
                    type: string
                discussionUrl:
                    type: string
                    format: uri
                commentCount:
                    type: integer
            required:
                - number
                - title
                - author
                - createdAt
                - updatedAt
                - body
                - discussionUrl
                - commentCount
            additionalProperties: false

        # Runtime config.
        # Public runtime config payload.
        RuntimeConfig:
            type: object
            properties:
                turnstileSiteKey:
                    type: string
                    description: Empty string when Turnstile is disabled.
            required:
                - turnstileSiteKey
            additionalProperties: false

        # Webhooks.
        # Webhook response envelopes.
        WebhookSuccessResponse:
            type: object
            properties:
                success:
                    type: boolean
                    const: true
                postNumber:
                    type: integer
            required:
                - success
                - postNumber
            additionalProperties: false

        WebhookIgnoredResponse:
            type: object
            properties:
                message:
                    type: string
            required:
                - message
            additionalProperties: false

        # GitHub discussion webhook payload (subset).
        GitHubDiscussionWebhook:
            type: object
            description: |
                TODO: confirm full GitHub discussion webhook payload; this is the required subset.
            properties:
                action:
                    type: string
                repository:
                    type: object
                    properties:
                        full_name:
                            type: string
                    required:
                        - full_name
                    additionalProperties: true
                discussion:
                    type: object
                    properties:
                        number:
                            type: integer
                        title:
                            type: string
                        body:
                            type: string
                        user:
                            type: object
                            properties:
                                login:
                                    type: string
                                avatar_url:
                                    type: string
                                    format: uri
                                html_url:
                                    type: string
                                    format: uri
                            required:
                                - login
                                - avatar_url
                                - html_url
                            additionalProperties: true
                        created_at:
                            type: string
                            format: date-time
                        updated_at:
                            type: string
                            format: date-time
                        html_url:
                            type: string
                            format: uri
                        comments:
                            type: integer
                        category:
                            type: object
                            properties:
                                name:
                                    type: string
                            additionalProperties: true
                    required:
                        - number
                        - title
                        - body
                        - user
                        - created_at
                        - updated_at
                        - html_url
                    additionalProperties: true
            required:
                - action
                - repository
                - discussion
            additionalProperties: true

    parameters:
        # Shared request parameters.
        # X-Session-Id is sanitized to alphanumeric/dash/underscore and max 128 chars (see reflect handler).
        SessionIdHeader:
            name: X-Session-Id
            in: header
            required: false
            description: Optional client-generated session id used for per-session rate limiting; when omitted, the server falls back to IP.
            schema:
                type: string

        TurnstileTokenHeader:
            name: X-Turnstile-Token
            in: header
            required: false
            description: Turnstile CAPTCHA token header when enabled.
            schema:
                type: string

        TraceResponseId:
            name: responseId
            in: path
            required: true
            description: Response id used to fetch a trace.
            schema:
                type: string

        BlogPostId:
            name: postId
            in: path
            required: true
            description: Numeric blog post id.
            schema:
                type: string
                pattern: '^\d+$'

    # No shared request bodies yet.
    requestBodies: {}

    # ====================
    # Shared responses
    # ====================
    responses:
        # Success responses.
        PreflightAccepted:
            description: Preflight accepted.
        ReflectOk:
            description: Reflect response with metadata.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ReflectResponse'
        TraceUpsertOk:
            description: Trace stored.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/TraceUpsertResponse'
        TraceFetchOk:
            description: Trace metadata.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ResponseMetadata'
        TraceCardCreateOk:
            description: Trace-card generated and stored.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/TraceCardResponse'
        TraceCardSvgOk:
            description: Trace-card SVG asset.
            content:
                image/svg+xml:
                    schema:
                        type: string
        BlogIndexOk:
            description: Blog index entries.
            content:
                application/json:
                    schema:
                        type: array
                        items:
                            $ref: '#/components/schemas/BlogPostIndexEntry'
        BlogPostOk:
            description: Blog post.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/BlogPost'
        WebhookOk:
            description: Webhook processed or ignored.
            content:
                application/json:
                    schema:
                        oneOf:
                            - $ref: '#/components/schemas/WebhookSuccessResponse'
                            - $ref: '#/components/schemas/WebhookIgnoredResponse'
        RuntimeConfigOk:
            description: Runtime config.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/RuntimeConfig'
        # Error envelope: use ErrorResponse (error required; details/retryAfter optional). Add request-id here if introduced.
        BadRequest:
            description: Bad request.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        Unauthorized:
            description: Missing or invalid credentials.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        Forbidden:
            description: Request was refused.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        Conflict:
            description: Request conflicts with current resource state.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        MethodNotAllowed:
            description: Method not allowed.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        NotFound:
            description: Resource not found.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        TooManyRequests:
            # Rate limit responses include Retry-After header and retryAfter body field (seconds).
            description: Rate limit exceeded.
            headers:
                Retry-After:
                    description: Seconds until retry allowed.
                    schema:
                        type: integer
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        InternalServerError:
            description: Unexpected server error.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        PayloadTooLarge:
            description: Request payload too large.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        ServiceUnavailable:
            description: Service unavailable or not configured.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        BadGateway:
            description: Upstream service error.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        Gone:
            description: Trace has expired.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/TraceStaleResponse'
