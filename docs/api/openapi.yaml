                Requires either `x-service-token` or `x-trace-token`.
                Intended for trusted internal callers; normal internal service rate limits still apply.
            tags:
                - Incidents
            security:
                - TrustedServiceToken: []
                - TraceToken: []
            parameters:
                - $ref: '#/components/parameters/IncidentId'
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
