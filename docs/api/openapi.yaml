            x-codeRefs:
                - packages/backend/src/handlers/blog.ts#handleBlogIndexRequest
                - packages/web/src/utils/api.ts#getBlogIndex
                - packages/contracts/src/web/types.ts#ListBlogPostsResponse
            summary: List blog posts
