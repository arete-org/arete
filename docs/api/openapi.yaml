            name: incidentId
            in: path
            required: true
            description: Operator-safe incident short ID.
            schema:
                type: string
                minLength: 1

        BlogPostId:
            name: postId
            in: path
            required: true
            description: Numeric blog post id.
            schema:
                type: string
