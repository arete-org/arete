                - packages/discord-bot/src/api/internalText.ts#runNewsTaskViaApi
                - packages/discord-bot/src/api/internalText.ts#runImageDescriptionTaskViaApi
                - packages/contracts/src/web/types.ts#PostInternalTextRequest
                - packages/contracts/src/web/types.ts#PostInternalTextResponse
            summary: Run a trusted internal text task
            description: |
                Trusted internal endpoint for backend-owned text tasks that should not become a generic prompt proxy.
                The current task set includes `news` and `image_description`.
                Requires either `x-service-token` or `x-trace-token`.
                Applies the backend trusted-service rate limit bucket, including per-token constraints for authenticated internal callers.
            tags:
                - Chat
            security:
                - TrustedServiceToken: []
                - TraceToken: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/InternalTextRequest'
            responses:
                '200':
                    $ref: '#/components/responses/InternalTextTaskOk'
                '400':
                    $ref: '#/components/responses/BadRequest'
                '401':
                    $ref: '#/components/responses/Unauthorized'
                '403':
                    $ref: '#/components/responses/Forbidden'
                '405':
                    $ref: '#/components/responses/MethodNotAllowed'
                '429':
                    $ref: '#/components/responses/TooManyRequests'
                '413':
                    $ref: '#/components/responses/PayloadTooLarge'
                '502':
                    $ref: '#/components/responses/BadGateway'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /api/internal/image:
        post:
            operationId: postInternalImageTask
