profiles:
    # ==========
    # OpenAI
    # ==========
    # https://platform.openai.com/docs/models/gpt-5-mini
    - id: openai-text-fast
      description: Lower-latency, quick replies and lightweight tasks.
      provider: openai
      providerModel: gpt-5-mini
      enabled: true
      tierBindings:
          - text-fast
      capabilities:
          canUseSearch: true
          toolCapabilities:
              routing.generation.structured-cheap: true
              routing.generation.balanced-general: true
              routing.generation.expressive-generation: false
      maxInputTokens: 400000
      maxOutputTokens: 128000
      costClass: low
      latencyClass: low

    # https://developers.openai.com/api/docs/models/gpt-5.4-mini
    - id: openai-text-medium
      description: Balanced, everyday conversation and general reasoning.
      provider: openai
      providerModel: gpt-5.4-mini
      enabled: true
      tierBindings:
          - text-medium
      capabilities:
          canUseSearch: true
          toolCapabilities:
              routing.generation.structured-cheap: true
              routing.generation.balanced-general: true
              routing.generation.expressive-generation: false
      maxInputTokens: 400000
      maxOutputTokens: 128000
      costClass: medium
      latencyClass: medium

    # https://platform.openai.com/docs/models/gpt-5.1
    - id: openai-text-quality
      description: Deeper reasoning and more complex prompts.
      provider: openai
      providerModel: gpt-5.1
      enabled: true
      tierBindings:
          - text-quality
      capabilities:
          canUseSearch: true
          toolCapabilities:
              routing.generation.structured-cheap: false
              routing.generation.balanced-general: true
              routing.generation.expressive-generation: true
      maxInputTokens: 1050000
      maxOutputTokens: 128000
      costClass: high
      latencyClass: high

    # ==========
    # Ollama Cloud
    # ==========
    # https://ollama.com/library/qwen3.5
    - id: ollama-text-qwen
      description: Very long-context, mixed coding and analysis workloads.
      provider: ollama
      providerModel: qwen3.5:cloud
      enabled: true
      tierBindings:
          - text-quality
      capabilities:
          canUseSearch: false
          toolCapabilities:
              routing.generation.structured-cheap: false
              routing.generation.balanced-general: true
              routing.generation.expressive-generation: true
      maxInputTokens: 262144
      # maxOutputTokens:
      costClass: high
      latencyClass: high

    # https://ollama.com/library/gpt-oss:20b-cloud
    - id: ollama-text-gptoss
      description: Solid everyday quality for general chat.
      provider: ollama
      providerModel: gpt-oss:20b-cloud
      enabled: true
      tierBindings:
          - text-medium
      capabilities:
          canUseSearch: false
          toolCapabilities:
              routing.generation.structured-cheap: true
              routing.generation.balanced-general: true
              routing.generation.expressive-generation: false
      maxInputTokens: 131072
      # maxOutputTokens:
      costClass: low
      latencyClass: low

    # ==========
    # Ollama Playground (manual /chat selection only)
    # ==========
    # These profiles are intentionally unbound from text tiers so they do not
    # change default mode routing. They are available for explicit profileId
    # selection while workflows and routing policy continue evolving.
    # Source for model names: https://ollama.com/api/tags and model library pages.
    # Class rubric:
    # - costClass approximates cloud spend from model/compute footprint.
    # - latencyClass approximates turnaround from model size + capability tier.
    - id: ollama-kimi-k2-6
      description: Long-horizon agentic model for complex coding and orchestration tasks.
      provider: ollama
      providerModel: kimi-k2.6
      enabled: true
      tierBindings: []
      capabilities:
