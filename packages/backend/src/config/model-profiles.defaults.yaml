profiles:
    - id: openai-text-fast
      description: Fast text profile for simple tasks.
      provider: openai
      providerModel: gpt-5-nano
      enabled: true
      tierBindings:
          - text-fast
      capabilities:
          canUseSearch: true
      # maxInputTokens:
      maxOutputTokens: 128000
      costClass: low
      latencyClass: low

    - id: openai-text-medium
      description: Medium-quality text profile for regular conversation.
      provider: openai
      providerModel: gpt-5-mini
      enabled: true
      tierBindings:
          - text-medium
      capabilities:
          canUseSearch: true
      # maxInputTokens:
      maxOutputTokens: 128000
      costClass: medium
      latencyClass: medium

    - id: openai-text-quality
      description: Higher-quality text profile for deeper responses.
      provider: openai
      providerModel: gpt-5.4-mini
      enabled: true
      tierBindings:
          - text-quality
      capabilities:
          canUseSearch: true
      # maxInputTokens:
      maxOutputTokens: 128000
      costClass: high
      latencyClass: high

    - id: ollama-text-fast
      description: Fast Ollama profile for local/private inference.
      provider: ollama
      providerModel: llama3.2:3b
      enabled: true
      tierBindings:
          - text-fast
      capabilities:
          canUseSearch: false
      # maxInputTokens:
      maxOutputTokens: 32768
      costClass: low
      latencyClass: medium

    - id: ollama-text-quality
      description: Higher-quality Ollama profile for detailed responses.
      provider: ollama
      providerModel: qwen2.5:14b
      enabled: true
      tierBindings:
          - text-quality
      capabilities:
          canUseSearch: false
      # maxInputTokens:
      maxOutputTokens: 32768
      costClass: medium
      latencyClass: high
