<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Footnote — Answers you can check</title>
        <meta
            name="description"
            content="A transparency-first AI framework that pairs responses with inspectable provenance and trace metadata."
        />
        <meta
            name="keywords"
            content="AI framework, transparency, provenance, trace metadata, open source, Discord bot, self-hosted, human oversight"
        />
        <meta name="author" content="Footnote Team" />
        <meta name="copyright" content="Footnote" />
        <!-- Open Graph metadata to enrich social sharing previews across platforms -->
        <meta property="og:title" content="Footnote — Answers you can check" />
        <meta
            property="og:description"
            content="A transparency-first AI framework that pairs responses with inspectable provenance and trace metadata."
        />
        <meta property="og:image" content="/social-card.png" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://ai.jordanmakes.dev" />
        <meta property="og:site_name" content="Footnote" />
        <meta property="og:locale" content="en_US" />
        <!-- Twitter / X card metadata ensures large-format previews when links are shared -->
        <meta name="twitter:card" content="summary_large_image" />
        <!-- Performance and accessibility -->
        <meta name="theme-color" content="#5865F2" />
        <meta name="color-scheme" content="light dark" />
        <!-- Favicon and app icons -->
        <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/assets/apple-touch-icon.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="192x192"
            href="/assets/android-chrome-192x192.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="512x512"
            href="/assets/android-chrome-512x512.png"
        />
        <!-- Structured data for search engines -->
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "SoftwareApplication",
                "name": "Footnote",
                "description": "A transparency-first AI framework that pairs responses with inspectable provenance and trace metadata.",
                "applicationCategory": "CommunicationApplication",
                "operatingSystem": "Self-hosted",
                "offers": {
                    "@type": "Offer",
                    "price": "0",
                    "priceCurrency": "USD"
                },
                "creator": {
                    "@type": "Organization",
                    "name": "Footnote Team"
                }
            }
        </script>
        <style>
            #root {
                min-height: 100dvh;
            }

            .preload-shell {
                box-sizing: border-box;
                min-height: 100dvh;
                margin: 0;
                padding: clamp(2.5rem, 10vw, 6rem) 1.25rem 2rem;
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 0.65rem;
                background: #f7f7fc;
                color: #10111a;
                font-family:
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    'Segoe UI',
                    sans-serif;
            }

            .preload-shell__mark {
                margin: 0;
                font-weight: 700;
                font-size: clamp(1.5rem, 4vw, 2rem);
                letter-spacing: 0.02em;
            }

            .preload-shell__line,
            .preload-shell__state {
                margin: 0;
                font-size: 1rem;
                line-height: 1.5;
            }

            .preload-shell__line {
                max-width: 28rem;
            }

            .preload-shell__state {
                display: inline-flex;
                align-items: center;
                gap: 0.45rem;
                color: #4a4d63;
            }

            .preload-shell__state::before {
                content: '';
                width: 0.55rem;
                height: 0.55rem;
                border-radius: 999px;
                background: currentColor;
                animation: preload-pulse 1.2s ease-in-out infinite;
            }

            @keyframes preload-pulse {
                0%,
                100% {
                    opacity: 0.35;
                    transform: scale(0.88);
                }
                50% {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            @media (prefers-color-scheme: dark) {
                .preload-shell {
                    background: #0b0c12;
                    color: #f2f3f8;
                }

                .preload-shell__state {
                    color: #adb1c7;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .preload-shell__state::before {
                    animation: none;
                    opacity: 0.8;
                }
            }
        </style>
    </head>
    <body>
        <div id="root">
            <div class="preload-shell" aria-live="polite">
                <p class="preload-shell__mark">Footnote</p>
                <p class="preload-shell__line">AI answers with receipts.</p>
                <p class="preload-shell__state">Loading Footnote…</p>
            </div>
        </div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
