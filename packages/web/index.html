<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Footnote — Answers you can check</title>
        <meta
            name="description"
            content="A transparency-first AI framework that pairs responses with inspectable provenance and trace metadata."
        />
        <meta
            name="keywords"
            content="AI framework, transparency, provenance, trace metadata, open source, Discord bot, self-hosted, human oversight"
        />
        <meta name="author" content="Footnote Team" />
        <meta name="copyright" content="Footnote" />
        <!-- Open Graph metadata to enrich social sharing previews across platforms -->
        <meta property="og:title" content="Footnote — Answers you can check" />
        <meta
            property="og:description"
            content="A transparency-first AI framework that pairs responses with inspectable provenance and trace metadata."
        />
        <meta property="og:image" content="/social-card.png" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://ai.jordanmakes.dev" />
        <meta property="og:site_name" content="Footnote" />
        <meta property="og:locale" content="en_US" />
        <!-- Twitter / X card metadata ensures large-format previews when links are shared -->
        <meta name="twitter:card" content="summary_large_image" />
        <!-- Performance and accessibility -->
        <meta name="theme-color" content="#5865F2" />
        <meta name="color-scheme" content="light dark" />
        <!-- Favicon and app icons -->
        <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/assets/apple-touch-icon.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="192x192"
            href="/assets/android-chrome-192x192.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="512x512"
            href="/assets/android-chrome-512x512.png"
        />
        <!-- Structured data for search engines -->
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "SoftwareApplication",
                "name": "Footnote",
                "description": "A transparency-first AI framework that pairs responses with inspectable provenance and trace metadata.",
                "applicationCategory": "CommunicationApplication",
                "operatingSystem": "Self-hosted",
                "offers": {
                    "@type": "Offer",
                    "price": "0",
                    "priceCurrency": "USD"
                },
                "creator": {
                    "@type": "Organization",
                    "name": "Footnote Team"
                }
            }
        </script>
        <style>
            body {
                margin: 0;
                background: #fdfcf9;
                color: #2b2a27;
            }

            #root {
                min-height: 100dvh;
            }

            .preload-shell {
                box-sizing: border-box;
                min-height: 100dvh;
                margin: 0;
                padding: clamp(2rem, 8vw, 5rem) 1.25rem;
                display: grid;
                place-content: center;
                background: transparent;
                color: inherit;
                font-family: 'Iowan Old Style', 'Palatino Linotype', serif;
            }

            .preload-shell__card {
                width: 15.5rem;
                max-width: calc(100vw - 2.5rem);
                padding: 0.62rem 0.95rem;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.55rem;
                border: 1px solid #e3ddd2;
                border-radius: 999px;
                background: #f7f2e9;
                box-shadow: 0 8px 18px rgba(52, 52, 52, 0.08);
            }

            .preload-shell__line {
                margin: 0;
                font-family: 'SFMono-Regular', 'JetBrains Mono', 'Courier New', monospace;
                font-size: 0.9rem;
                font-weight: 600;
                line-height: 1.4;
                color: #2b2a27;
                white-space: nowrap;
            }

            .preload-shell__state {
                width: 0.95rem;
                height: 0.95rem;
                color: #4a7c59;
            }

            .preload-shell__state .spinner {
                width: 100%;
                height: 100%;
                display: block;
            }

            .preload-shell__state .spinner::before {
                content: '';
                display: block;
                width: 100%;
                height: 100%;
                border-radius: 50%;
                border: 0.125em solid currentColor;
                border-right-color: transparent;
                box-sizing: border-box;
                animation: spin 0.75s linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .preload-shell__state .spinner::before {
                    animation: none;
                }
            }
        </style>
    </head>
    <body>
        <div id="root">
            <div class="preload-shell" aria-live="polite">
                <div class="preload-shell__card">
                    <span class="preload-shell__state" aria-hidden="true"
                        ><span class="spinner"></span
                    ></span>
                    <p class="preload-shell__line">Loading page...</p>
                </div>
            </div>
        </div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
